<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C Drama Story Planner - AI Enhanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-theme="dark" class="min-h-screen bg-[#09090b] text-zinc-100 antialiased">
    <div class="app-shell">
        <header class="topbar border-b border-zinc-800 bg-zinc-950 backdrop-blur-xl">
            <div class="topbar-title">
                <div class="topbar-title-row">
                    <div class="app-mark flex h-11 w-11 items-center justify-center rounded-2xl border border-zinc-800 bg-gradient-to-br from-indigo-500/25 to-violet-600/25 text-lg shadow-sm">📖</div>
                    <div>
                        <div class="app-name text-base font-extrabold tracking-tight text-zinc-50">C Drama Story Planner</div>
                        <div class="app-subtitle mt-0.5 text-sm text-zinc-400">Characters • Beats • Plot • Politics • Visual Storyboard</div>
                    </div>
                </div>
            </div>
            <div class="topbar-actions">
                <button class="rounded-xl bg-violet-600 px-4 py-2 text-sm font-extrabold text-white shadow-lg shadow-violet-950/30 hover:bg-violet-700" onclick="App.switchTab('master-document')">Open Master Document</button>
                <button class="rounded-xl bg-violet-600 px-5 py-2.5 text-sm font-extrabold text-white shadow-lg shadow-violet-950/30 hover:bg-violet-700" onclick="App.openStorySetupWizard()" title="Build story context with Dan Harmon’s Story Circle">Start Story Setup Wizard</button>
                <button class="rounded-xl border border-zinc-800 bg-zinc-900/60 px-4 py-2 text-sm font-extrabold text-zinc-100 hover:bg-zinc-800/70" id="themeToggleBtn" onclick="App.toggleTheme()" title="Toggle theme">Light</button>
                <button class="rounded-xl border border-zinc-800 bg-zinc-900/60 px-4 py-2 text-sm font-extrabold text-zinc-100 hover:bg-zinc-800/70" onclick="App.switchTab('ai-settings')">AI Settings</button>
            </div>
        </header>

        <aside class="sidebar w-[280px] shrink-0 flex-col border-r border-zinc-800/80 bg-zinc-900" aria-label="Main navigation">
            <div class="sidebar-nav flex min-h-0 flex-1 flex-col px-2 pb-2 pt-3">
                <div class="px-2 pb-2 text-[11px] font-extrabold uppercase tracking-[0.14em] text-zinc-500">Navigate</div>
                <div class="flex min-h-0 flex-1 flex-col gap-0.5">
                    <button type="button" class="tab-button active" onclick="App.switchTab('dashboard')"><span class="sidebar-nav-icon" aria-hidden="true">⌂</span><span>Dashboard</span></button>
                    <button type="button" class="tab-button" onclick="App.switchTab('timeline')"><span class="sidebar-nav-icon" aria-hidden="true">⟲</span><span>Timeline</span></button>
                    <button type="button" class="tab-button" onclick="App.switchTab('characters')"><span class="sidebar-nav-icon" aria-hidden="true">◎</span><span>Characters</span></button>
                    <button type="button" class="tab-button" onclick="App.switchTab('plot')"><span class="sidebar-nav-icon" aria-hidden="true">☰</span><span>Plot</span></button>
                    <button type="button" class="tab-button" onclick="App.switchTab('politics')"><span class="sidebar-nav-icon" aria-hidden="true">⚖</span><span>Politics</span></button>
                    <button type="button" class="tab-button" onclick="App.switchTab('workitems')"><span class="sidebar-nav-icon" aria-hidden="true">✓</span><span>Work items</span></button>
                    <button type="button" class="tab-button" onclick="App.switchTab('visualizer')"><span class="sidebar-nav-icon" aria-hidden="true">▦</span><span>Visualizer</span></button>
                    <button type="button" class="tab-button" onclick="App.switchTab('templates')"><span class="sidebar-nav-icon" aria-hidden="true">✦</span><span>Templates</span></button>
                </div>
            </div>

            <div class="sidebar-nav sidebar-ai-section sidebar-ai-footer px-2">
                <div class="px-2 pb-2 text-[11px] font-extrabold uppercase tracking-[0.14em] text-zinc-500">AI + Outputs</div>
                <div class="flex flex-col gap-0.5 pb-2">
                    <button type="button" class="tab-button" onclick="App.switchTab('master-document')" title="Master Document"><span class="sidebar-nav-icon" aria-hidden="true">▤</span><span>Master</span></button>
                    <button type="button" class="tab-button" onclick="App.switchTab('visualizer')" title="Visualizer"><span class="sidebar-nav-icon" aria-hidden="true">▦</span><span>Visuals</span></button>
                    <button type="button" class="tab-button" onclick="App.switchTab('ai-queue')" title="AI Story Tasks"><span class="sidebar-nav-icon" aria-hidden="true">☑</span><span>AI tasks</span></button>
                    <button type="button" class="tab-button" onclick="App.switchTab('ai-settings')" title="AI Settings"><span class="sidebar-nav-icon" aria-hidden="true">⚙</span><span>Settings</span></button>
                </div>
                <div class="mx-1 mb-1 rounded-xl border border-dashed border-zinc-800/80 bg-zinc-950/40 p-3 text-xs leading-relaxed text-zinc-500">
                    Start in <span class="font-semibold text-zinc-200">Timeline</span>, then use <span class="font-semibold text-zinc-200">Visualizer</span> + <span class="font-semibold text-zinc-200">AI tasks</span>.
                </div>
            </div>
        </aside>

        <nav class="mobile-tabbar border-t border-zinc-800/80 bg-zinc-950/80 backdrop-blur-xl" aria-label="Tabs">
            <button class="tab-button active flex flex-col items-center gap-1 rounded-xl border border-transparent px-2 py-2 text-xs font-extrabold text-zinc-100 hover:border-indigo-500/30 hover:bg-indigo-500/10" onclick="App.switchTab('dashboard')" aria-label="Dashboard"><span class="mobile-tab-icon text-base">⌂</span><span class="mobile-tab-label">Home</span></button>
            <button class="tab-button flex flex-col items-center gap-1 rounded-xl border border-transparent px-2 py-2 text-xs font-extrabold text-zinc-100 hover:border-indigo-500/30 hover:bg-indigo-500/10" onclick="App.switchTab('characters')" aria-label="Characters"><span class="mobile-tab-icon text-base">◎</span><span class="mobile-tab-label">Chars</span></button>
            <button class="tab-button flex flex-col items-center gap-1 rounded-xl border border-transparent px-2 py-2 text-xs font-extrabold text-zinc-100 hover:border-indigo-500/30 hover:bg-indigo-500/10" onclick="App.switchTab('timeline')" aria-label="Timeline"><span class="mobile-tab-icon text-base">⟲</span><span class="mobile-tab-label">Beats</span></button>
            <button class="tab-button flex flex-col items-center gap-1 rounded-xl border border-transparent px-2 py-2 text-xs font-extrabold text-zinc-100 hover:border-indigo-500/30 hover:bg-indigo-500/10" onclick="App.switchTab('workitems')" aria-label="Tasks"><span class="mobile-tab-icon text-base">✓</span><span class="mobile-tab-label">Tasks</span></button>
            <button class="tab-button flex flex-col items-center gap-1 rounded-xl border border-transparent px-2 py-2 text-xs font-extrabold text-zinc-100 hover:border-indigo-500/30 hover:bg-indigo-500/10" onclick="App.switchTab('visualizer')" aria-label="Visuals"><span class="mobile-tab-icon text-base">▦</span><span class="mobile-tab-label">Visuals</span></button>
        </nav>

        <!-- Mobile quick add -->
        <div id="mobileQuickAdd" class="mobile-quick-add" aria-hidden="true">
            <button class="mobile-quick-add-fab" onclick="App.toggleMobileQuickAdd()" aria-label="Quick add">+</button>
            <div id="mobileQuickAddSheet" class="mobile-quick-add-sheet" role="dialog" aria-label="Quick add menu">
                <button class="mobile-quick-add-item" onclick="App.quickAdd('character')">👥 Add Character</button>
                <button class="mobile-quick-add-item" onclick="App.quickAdd('event')">🗓️ Add Event</button>
                <button class="mobile-quick-add-item" onclick="App.quickAdd('task')">✅ Add Task</button>
            </div>
        </div>

        <main class="main main-content min-w-0 bg-[#09090b]">
            <div class="content max-w-6xl">

        <!-- Tabs (content is rendered by js/components/*) -->
        <div id="dashboard" class="tab-content active"></div>
        <div id="templates" class="tab-content"></div>
        <div id="characters" class="tab-content"></div>
        <div id="timeline" class="tab-content"></div>
        <div id="plot" class="tab-content"></div>
        <div id="politics" class="tab-content"></div>
        <div id="workitems" class="tab-content"></div>
        <div id="master-document" class="tab-content"></div>
        <div id="visualizer" class="tab-content"></div>
        <div id="ai-actions" class="tab-content"></div>
        <div id="ai-queue" class="tab-content"></div>
        <div id="ai-settings" class="tab-content"></div>
            </div>
        </main>
    </div>

    <!-- Modals will be inserted here by JavaScript -->
    <div id="modalsContainer"></div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
